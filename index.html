<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eggodoro-Timer</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app">
        <div class="frame">
            <!-- Audio Imports -->
            <audio id="startMenuMusic" autoplay loop>
                <source src="audio/Best Friend (8 Bits) - Lofi Hip Hop (8 Bits Music)  [HD] 1080p.mp3">
            </audio>
            <audio id="OrbodoroMusic" preload="auto">
                <source src="audio/Begin Your Journey.mp3">
            </audio>
            <audio id="restMusic" preload="auto">
                <source src="audio/A Lonely Cherry Tree.mp3">
            </audio>
            <!-- Window Hotbar buttons-->
            <div class="hotBar">
                <div class="windowButtons">
                    <button id="backWindow"> < </button>
                    <button id="minimizeBtn">_</button>
                    <button id="closeBtn">x</button>
                </div>
            </div>
            <!-- Base of the application -->
            <div class="content">
                <!-- Start Screen that acts as the introductory page for the application! -->
                <div class="screen startScreen active">
                    <div class="startTitle">
                        <p>The Orbodoro Timer</p>
                    </div>
                    <div class="startButtons">
                        <button id="play">Play</button>
                    </div>
                </div>
                <!-- Main Menu Screen that contains the gateway to the Timer, settings, gallery and music page! -->
                <div class="screen menuScreen">
                    <div class="menuTitle">
                        <p>Menu</p>
                    </div>
                    <div class="menuButtons">
                        <button id="orbTimer">Orb-Timer</button>
                        <button id="settings">Settings</button>
                        <button id="gallery">Gallery</button>
                        <button id="music">Music</button>
                    </div>
                </div>
                <!-- Timer Screen for studying and rest! -->
                <div class="screen timerScreen">
                    <div class="title">
                        <p id="timertitle">Orbodoro!</p>
                    </div>
                    <div class="timer">
                        <p class="timer" id="timer">25:00</p>
                    </div>
                    <div class="buttons">
                        <button id="start">Start</button>
                        <button id ="reset">Cancel</button>
                    </div>
                </div>
                <!-- Timer Pop Up Overlay -->
                <div class="timerPopUp" id="overlay">
                        <div class="titleP">
                            <p>Are you sure you want to quit?</p>
                            <p>Leaving now will reset the Orbodoro Timer.</p>
                        </div>
                        <div class="buttons">
                            <button id="leave">Leave</button>
                            <button id="stay">Stay</button>
                        </div>
                    </div>
                <!-- Settings Screen to allow the user to make altercations to the Timer, Rest Timer, Music volume and SFX Volume! -->
                <div class="screen settingScreen">
                    <div class="title">
                        <p>Settings</p>
                    </div>
                    <div class="settingsSlider">
                        <label for="sliderLabel">Duration</label>
                        <input type="range" min ="1" max="60" step="5" value="25" id="timerSlider">
                    </div>
                    <div class="settingsSlider">
                        <label for="sliderLabel">Rest</label>
                        <input type="range" min="1" max="30" step="5" value="5" id="breakSlider">
                    </div>
                    <div class="settingsSlider">
                        <label for="sliderLabel">Music</label>
                        <input type="range" min="0" max="1" step="0.01" id="musicSlider">
                    </div>
                    <div class="settingsSlider">
                        <label for="sliderLabel">Sfx</label>
                        <input type="range" min="0" max="1" step="0.01" id="sfxSlider">
                    </div>
                </div>
                <!-- Gallery Screen that allows customation opetions (WIP)!  -->
                <div class="screen galleryScreen">
                    <div class="title">
                        <p>Gallery</p>
                    </div>
                    <div class="galleryButtons"></div>
                </div>
                <!-- Music Screen that allows change in music for the Study Timer and Rest Timer (WIP)! -->
                <div class="screen musicScreen">
                    <div class="title">
                        <p>Music</p>
                    </div>
                    <div class="musicButtons"></div>
                </div>

            </div>
        </div>
    </div>

    <script src="script.js"></Script>
</body>
</html>
